<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jim's Language Tool</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --primary: #4a90e2;
      --primary-dark: #357abd;
      --success: #27ae60;
      --danger: #e74c3c;
      --grammar: #3498db;
      --synonym: #9b59b6;
      --warn: #f39c12;
      --bg: #ffffff;
      --bg-secondary: #f8f9fa;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --border: #e1e8ed;
    }
    
    html, body {
      max-height: 600px;
      overflow: hidden;
    }

    body {
      width: 420px;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 0;
      display: flex;
      flex-direction: column;
    }
    
    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 16px 20px 0;
    }
    
    h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    
    .subtitle {
      font-size: 11px;
      opacity: 0.85;
      margin-bottom: 14px;
    }
    
    /* ── Tab Bar ── */
    .tab-bar {
      display: flex;
      gap: 0;
    }
    
    .tab {
      flex: 1;
      padding: 9px 0;
      background: rgba(255,255,255,0.15);
      border: none;
      color: rgba(255,255,255,0.75);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      transition: all 0.2s;
      letter-spacing: 0.2px;
    }
    
    .tab:hover {
      background: rgba(255,255,255,0.25);
      color: white;
    }
    
    .tab.active {
      background: var(--bg);
      color: var(--primary-dark);
    }
    
    /* ── Tab Panels ── */
    .panel {
      display: none;
      padding: 18px;
      overflow-y: auto;
      max-height: 500px;
    }
    
    .panel.active {
      display: block;
    }

    /* ════════════════════════════
       SITES PANEL (existing UI)
    ════════════════════════════ */
    .status-card {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 16px;
      border-left: 4px solid var(--border);
    }
    
    .status-card.active  { border-left-color: var(--success); background: #e8f5e9; }
    .status-card.inactive { border-left-color: var(--danger);  background: #ffebee; }
    
    .status-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light);
      margin-bottom: 3px;
      font-weight: 600;
    }
    
    .status-text { font-size: 13px; font-weight: 600; }
    .status-card.active   .status-text { color: var(--success); }
    .status-card.inactive .status-text { color: var(--danger); }
    
    .current-url {
      background: var(--bg-secondary);
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 14px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      word-break: break-all;
      border: 1px solid var(--border);
    }
    
    .btn {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    
    .btn-primary {
      background: var(--primary);
      color: white;
      margin-bottom: 16px;
    }
    
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      color: var(--text);
    }
    
    .dictionary-note {
      font-size: 11px;
      color: var(--text-light);
      margin-bottom: 10px;
      font-style: italic;
    }
    
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    input[type="text"] {
      flex: 1;
      padding: 9px 11px;
      border: 2px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      transition: border-color 0.2s;
    }
    
    input[type="text"]:focus { outline: none; border-color: var(--primary); }
    
    .btn-add {
      padding: 9px 18px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-add:hover { background: var(--primary-dark); }
    
    .url-list {
      max-height: 130px;
      overflow-y: auto;
      margin-bottom: 14px;
    }
    
    .url-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: var(--bg-secondary);
      border-radius: 6px;
      margin-bottom: 6px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    
    .url-item:hover { border-color: var(--primary); }
    
    .url-text {
      font-size: 12px;
      font-family: 'Courier New', monospace;
      word-break: break-all;
      flex: 1;
      margin-right: 10px;
    }
    
    .btn-remove {
      background: var(--danger);
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      transition: all 0.2s;
      white-space: nowrap;
    }
    
    .btn-remove:hover { background: #c0392b; }
    
    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: var(--text-light);
      font-size: 13px;
    }
    
    .empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.3; }

    /* ════════════════════════════
       CHECK TEXT PANEL
    ════════════════════════════ */

    /* Mirror highlight system */
    .editor-wrap {
      position: relative;
      margin-bottom: 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: white;
      transition: border-color 0.2s;
    }

    .editor-wrap:focus-within { border-color: var(--primary); }

    /* The highlight layer sits behind the textarea */
    #highlight-layer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      padding: 10px 12px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-y: auto;
      border-radius: 6px;
      pointer-events: none;
      color: transparent; /* text invisible — only marks show */
    }

    #check-input {
      position: relative;
      display: block;
      width: 100%;
      height: 160px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      line-height: 1.55;
      border: none;
      border-radius: 6px;
      outline: none;
      resize: none;
      background: transparent;
      color: var(--text);
      caret-color: var(--text);
      z-index: 1;
    }

    /* Highlight marks inside the layer */
    .hl-spell {
      background-color: rgba(231, 76, 60, 0.35);
      border-bottom: none;
      border-radius: 2px;
      color: transparent;
    }

    .hl-grammar {
      background-color: rgba(241, 196, 15, 0.55);
      border-bottom: none;
      border-radius: 2px;
      color: transparent;
    }

    /* Action row */
    .check-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .btn-check {
      flex: 1;
      padding: 9px 0;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .btn-check:hover { background: var(--primary-dark); }
    .btn-check:disabled { background: #b0c4de; cursor: not-allowed; }

    .btn-copy {
      padding: 9px 14px;
      background: var(--success);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-copy:hover { background: #229954; }
    .btn-copy.copied { background: #1e8449; }

    .btn-clear-text {
      padding: 9px 14px;
      background: var(--bg-secondary);
      color: var(--text-light);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .btn-clear-text:hover { background: var(--border); color: var(--text); }

    /* Status bar */
    #check-status {
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 10px;
      min-height: 18px;
    }

    #check-status.has-errors { color: var(--danger); font-weight: 600; }
    #check-status.clean { color: var(--success); font-weight: 600; }
    #check-status.loading { color: var(--primary); }

    /* Error cards */
    #error-list {
      max-height: 260px;
      overflow-y: auto;
    }

    .err-card {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 11px 13px;
      margin-bottom: 8px;
      border-left: 3px solid var(--border);
      cursor: pointer;
      transition: box-shadow 0.15s;
    }

    .err-card.spell  { border-left-color: var(--danger); }
    .err-card.grammar { border-left-color: var(--grammar); }
    .err-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

    .err-card-header {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 5px;
    }

    .err-badge {
      display: inline-block;
      color: white;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .err-word {
      font-family: 'Courier New', monospace;
      font-weight: 700;
      font-size: 13px;
    }

    .err-msg {
      font-size: 11px;
      color: var(--text-light);
      margin-bottom: 7px;
      line-height: 1.4;
    }

    .err-body { display: none; }
    .err-card.open .err-body { display: block; }

    .fix-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 6px;
    }

    .btn-fix {
      padding: 5px 11px;
      background: var(--success);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-fix:hover { background: #229954; transform: translateY(-1px); }

    .btn-dict {
      padding: 5px 11px;
      background: var(--warn);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-dict:hover { background: #d68910; }

    .btn-ignore-err {
      padding: 5px 11px;
      background: #95a5a6;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-ignore-err:hover { background: #7f8c8d; }

    .btn-syn {
      padding: 5px 11px;
      background: var(--synonym);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-syn:hover { background: #8e44ad; }
    .btn-syn:disabled { background: #bdc3c7; cursor: not-allowed; }

    .syn-results {
      margin-top: 7px;
    }

    .syn-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-light);
      margin-bottom: 5px;
    }

    .syn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .btn-syn-replace {
      padding: 4px 10px;
      background: var(--synonym);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-syn-replace:hover { background: #8e44ad; }

    .no-syn {
      font-size: 11px;
      color: var(--text-light);
      font-style: italic;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
  </style>
</head>
<body>
  <div class="header">
    <h1>Jim's Language Tool</h1>
    <p class="subtitle">Powered by LanguageTool API</p>

    <div class="tab-bar">
      <button class="tab active" data-tab="sites">⚙ Sites</button>
      <button class="tab"        data-tab="checker">✍ Check Text</button>
    </div>
  </div>

  <!-- ══════════ SITES PANEL ══════════ -->
  <div class="panel active" id="panel-sites">
    <div id="statusCard" class="status-card">
      <div class="status-label">Status on this page</div>
      <div class="status-text" id="statusText">Checking...</div>
    </div>

    <div class="current-url" id="currentUrl">Loading...</div>

    <button class="btn btn-primary" id="addCurrent">✓ Add Current Page</button>

    <div class="section-title">Add URL Manually</div>
    <div class="input-group">
      <input type="text" id="urlInput" placeholder="example.com">
      <button class="btn-add" id="addUrl">Add</button>
    </div>

    <div class="section-title">Allowed URLs</div>
    <div class="url-list" id="urlList"></div>

    <div class="section-title" style="margin-top: 22px;">Custom Dictionary</div>
    <div class="dictionary-note">Words you've added to ignore spell check</div>
    <div class="url-list" id="dictionaryList"></div>
  </div>

  <!-- ══════════ CHECK TEXT PANEL ══════════ -->
  <div class="panel" id="panel-checker">

    <!-- Mirror highlight editor -->
    <div class="editor-wrap">
      <div id="highlight-layer" aria-hidden="true"></div>
      <textarea id="check-input" placeholder="Paste or type your text here…" spellcheck="false"></textarea>
    </div>

    <div class="check-actions">
      <button class="btn-check" id="btn-check">🔍 Check</button>
      <button class="btn-copy"  id="btn-copy" title="Copy corrected text">📋 Copy</button>
      <button class="btn-clear-text" id="btn-clear">Clear</button>
    </div>

    <div id="check-status"></div>
    <div id="error-list"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
