<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jim's Language Tool</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --primary: #4a90e2;
      --primary-dark: #357abd;
      --success: #27ae60;
      --danger: #e74c3c;
      --bg: #ffffff;
      --bg-secondary: #f8f9fa;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --border: #e1e8ed;
    }
    
    body {
      width: 400px;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 0;
    }
    
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }
    
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .subtitle {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .content {
      padding: 20px;
    }
    
    .status-card {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      border-left: 4px solid var(--border);
    }
    
    .status-card.active {
      border-left-color: var(--success);
      background: #e8f5e9;
    }
    
    .status-card.inactive {
      border-left-color: var(--danger);
      background: #ffebee;
    }
    
    .status-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light);
      margin-bottom: 4px;
      font-weight: 600;
    }
    
    .status-text {
      font-size: 14px;
      font-weight: 600;
    }
    
    .status-card.active .status-text {
      color: var(--success);
    }
    
    .status-card.inactive .status-text {
      color: var(--danger);
    }
    
    .current-url {
      background: var(--bg-secondary);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      color: var(--text);
      word-break: break-all;
      border: 1px solid var(--border);
    }
    
    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    
    .btn-primary {
      background: var(--primary);
      color: white;
      margin-bottom: 20px;
    }
    
    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(74, 144, 226, 0.3);
    }
    
    .btn-primary:active {
      transform: translateY(0);
    }
    
    .section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      color: var(--text);
    }
    
    .dictionary-note {
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 12px;
      font-style: italic;
    }
    
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    
    input {
      flex: 1;
      padding: 10px 12px;
      border: 2px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      transition: border-color 0.2s;
    }
    
    input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .btn-add {
      padding: 10px 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-add:hover {
      background: var(--primary-dark);
    }
    
    .url-list {
      max-height: 240px;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    
    .url-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 6px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    
    .url-item:hover {
      border-color: var(--primary);
      transform: translateX(2px);
    }
    
    .url-text {
      font-size: 13px;
      font-family: 'Courier New', monospace;
      word-break: break-all;
      flex: 1;
      margin-right: 12px;
    }
    
    .btn-remove {
      background: var(--danger);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .btn-remove:hover {
      background: #c0392b;
      transform: scale(1.05);
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
      font-size: 14px;
    }
    
    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.3;
    }
    
    ::-webkit-scrollbar {
      width: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Jim's Language Tool</h1>
    <p class="subtitle">Powered by LanguageTool API</p>
  </div>
  
  <div class="content">
    <div id="statusCard" class="status-card">
      <div class="status-label">Status on this page</div>
      <div class="status-text" id="statusText">Checking...</div>
    </div>
    
    <div class="current-url" id="currentUrl">Loading...</div>
    
    <button class="btn btn-primary" id="addCurrent">✓ Add Current Page</button>
    
    <div class="section-title">Add URL Manually</div>
    <div class="input-group">
      <input type="text" id="urlInput" placeholder="example.com">
      <button class="btn-add" id="addUrl">Add</button>
    </div>
    
    <div class="section-title">Allowed URLs</div>
    <div class="url-list" id="urlList"></div>
    
    <div class="section-title" style="margin-top: 30px;">Custom Dictionary</div>
    <div class="dictionary-note">Words you've added to ignore spell check</div>
    <div class="url-list" id="dictionaryList"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
